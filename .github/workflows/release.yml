name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require tag to point at latest main
        run: |
          git fetch --quiet origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::tag $GITHUB_REF_NAME points at $(git rev-parse --short HEAD) but latest main is $(git rev-parse --short origin/main) — tag the current main HEAD"
            exit 1
          fi

  ci:
    needs: check-main
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
