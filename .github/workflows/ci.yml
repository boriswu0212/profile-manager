name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      # Non-verbose multi-package `go test` swallows all output of passing
      # packages, hiding the windows-only verdicts (did the --settings JSON
      # survive a claude.cmd shim? did the console tests run or skip?).
      # Re-run just those tests verbosely so the answers land in the log.
      - if: runner.os == 'Windows'
        run: go test -v -run 'TestExecProcessIgnoresCtrlBreak|TestLaunchThrough|TestStdinReadableConsole' ./internal/runner ./cmd
      - run: go build -o pm${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/pm
